<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klaudia Ľaľová</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  </head>
  <body>

    <!-- Navbar -->
    <div class="navbar navbar-dark bg-secondary sticky-top">
      <div class="hstack w-100 gap-5">
        <a href="index.html" class="text-decoration-none">
          <div class="h3 ms-3 text-light my-1">
            <i class="bi bi-stars text-primary"></i> Klaudia Ľaľová
          </div>
        </a>
        <button class="btn me-3 ms-auto" type="button" id="menuOpenBtn">
          <div class="h3 text-light my-1">MENU</div>
        </button>
      </div>
    </div>

    <!-- Hero Section -->
    <section class="hero">
      <div class="hero-content">
        <h1>Klaudia Ľaľová</h1>
        <p>Computer Science student passionate about creating, exploring, and
          discovering elegant solutions to complex problems.</p>
      </div>
    </section>

    <!-- Menu -->
    <div class="menu_index" id="fullPageMenu">
      <div class="hstack w-100 gap-5 bg-dark mt-2">
        <div class="h3 ms-3 text-light my-1">
          <i class="bi bi-stars text-primary"></i>
        </div>
        <button class="btn me-3 ms-auto" type="button" id="menuCloseBtn">
          <div class="hstack">
            <div class="h3 text-light my-1 me-2 menu-close-header">Close</div>
            <div class="h3 text-light my-1">MENU</div>
          </div>
        </button>
      </div>
      <div class="container-fluid bg-dark menu-content">
        <div class="row">
          <div class="col py-md-5 ps-md-5">
            <div class="display-2 ps-md-5 pb-md-5 ps-3 pt-3 menu-link">
              <a class="text-light text-decoration-none"
                href="projects.html">Projects</a>
            </div>
            <div
              class="display-2 ps-md-5 py-md-5 ps-3 pt-5 menu-link menu-link-current">
              <a class="text-light text-decoration-none"
                href="index.html">Home</a>
            </div>
            <div class="display-2 ps-md-5 pb-md-5 ps-3 pt-3 menu-link">
              <a class="text-light text-decoration-none" href="about.html">About
                me</a>
            </div>
          </div>
          <div class="col py-md-5 pt-1 ps-4 menu-contact">
            <div class="fs-5 text-light-emphasis pt-5">Contact</div>
            <div class="fs-3 text-light">klaudia.lalova@gmail.com</div>
            <div class="fs-5 text-light-emphasis mt-3">Let's keep in
              touch!</div>
            <div class="fs-3 pb-1">
              <a class="text-decoration-none text-light"
                href="https://www.linkedin.com/in/klaudia-%C4%BEa%C4%BEov%C3%A1-639526275/">
                <i class="bi bi-linkedin"></i> LinkedIn
              </a>
            </div>
            <div class="fs-3">
              <a class="text-decoration-none text-light"
                href="https://github.com/klaud1a">
                <i class="bi bi-github"></i> Github
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="navbar navbar-dark bg-secondary justify-content-center">
      <div class="h5 text-light my-1 d-flex align-items-center gap-2">
        <span>Made with</span>
        <i class="bi bi-heart text-primary"></i>
        <span>in 2025</span>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
  const menu = document.getElementById('fullPageMenu');
  const openBtn = document.getElementById('menuOpenBtn');
  const closeBtn = document.getElementById('menuCloseBtn');

  openBtn.addEventListener('click', function() {
    menu.classList.add('active');
    document.body.classList.add('menu-open');
  });

  closeBtn.addEventListener('click', function() {
    menu.classList.remove('active');
    document.body.classList.remove('menu-open');
  });
</script>

  </body>
</html>
